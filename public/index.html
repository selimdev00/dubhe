<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Картотека постов: доска авторов и их записей с перетаскиванием карточек между колонками.">
    <meta name="theme-color" content="#c68a3a" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1c1814" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/svg+xml" href="<%= BASE_URL %>favicon.svg">
    <link rel="icon" type="image/x-icon" href="<%= BASE_URL %>favicon.ico">
    <link rel="apple-touch-icon" href="<%= BASE_URL %>apple-touch-icon.png">
    <link rel="manifest" href="<%= BASE_URL %>site.webmanifest">
    <title>Картотека постов</title>
    <script>
      // Apply the user's color scheme before first paint to avoid a flash.
      try {
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <noscript>
      <strong>Для работы приложения нужен включённый JavaScript. Пожалуйста, включите его и обновите страницу.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
